name: 🐧 Build Electron App for Linux
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔨 Build app
      run: npm run build
    
    - name: 📱 Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: myapp-deb
        path: dist/*.deb
        retention-days: 30
